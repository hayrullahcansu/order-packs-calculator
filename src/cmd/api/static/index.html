<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Packs Calculator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
        .container { max-width: 640px; margin: 0 auto; padding: 32px 16px; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 24px; }
        h2 { font-size: 20px; font-weight: 700; margin-bottom: 16px; }
        .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 20px; margin-bottom: 24px; }
        .card-header { font-weight: 600; font-size: 15px; color: #555; margin-bottom: 12px; }
        .pack-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .pack-row input { flex: 1; padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .pack-row input:focus { outline: none; border-color: #4CAF50; }
        .btn-remove { background: none; border: none; color: #e53935; font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 4px; }
        .btn-remove:hover { background: #fce4ec; }
        .btn-add { background: none; border: 1px dashed #ccc; color: #888; padding: 8px; border-radius: 4px; cursor: pointer; font-size: 13px; width: 100%; margin-bottom: 12px; }
        .btn-add:hover { border-color: #4CAF50; color: #4CAF50; }
        .btn-submit { background: #4CAF50; color: #fff; border: none; padding: 10px 24px; border-radius: 4px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn-submit:hover { background: #43A047; }
        .btn-submit:disabled { background: #a5d6a7; cursor: not-allowed; }
        .calc-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .calc-row label { font-size: 14px; font-weight: 500; white-space: nowrap; }
        .calc-row input { flex: 1; padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        .calc-row input:focus { outline: none; border-color: #4CAF50; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px 12px; background: #f5f5f5; font-size: 14px; font-weight: 600; border-bottom: 2px solid #e0e0e0; }
        td { padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 14px; }
        .msg { padding: 10px; border-radius: 4px; margin-bottom: 12px; font-size: 13px; }
        .msg-ok { background: #e8f5e9; color: #2e7d32; }
        .msg-err { background: #fce4ec; color: #c62828; }
        .empty { color: #999; font-size: 13px; text-align: center; padding: 16px; }
    </style>
</head>
<body>
<div class="container">
    <h1>Order Packs Calculator</h1>

    <div class="card">
        <div class="card-header">Pack Sizes</div>
        <div id="pack-list"></div>
        <button class="btn-add" onclick="addPackRow()">+ Add pack size</button>
        <div id="pack-msg"></div>
        <button class="btn-submit" id="btn-save" onclick="submitPacks()">Submit pack sizes change</button>
    </div>

    <h2>Calculate packs for order</h2>
    <div class="calc-row">
        <label for="order-input">Items:</label>
        <input type="number" id="order-input" min="1" placeholder="e.g. 263">
        <button class="btn-submit" onclick="calculate()">Calculate</button>
    </div>
    <div id="calc-msg"></div>
    <div class="card" id="result-card" style="display:none;">
        <table>
            <thead><tr><th>Pack</th><th>Quantity</th></tr></thead>
            <tbody id="result-body"></tbody>
        </table>
    </div>
</div>

<script>
const API = '/v1/order_packs';
let currentPacks = [];

function showMsg(el, text, ok) {
    el.innerHTML = `<div class="msg ${ok ? 'msg-ok' : 'msg-err'}">${text}</div>`;
    setTimeout(() => el.innerHTML = '', 3000);
}

function renderPacks() {
    const list = document.getElementById('pack-list');
    list.innerHTML = '';
    currentPacks.forEach((p, i) => {
        const row = document.createElement('div');
        row.className = 'pack-row';
        row.innerHTML = `<input type="number" min="1" value="${p.items}" data-index="${i}" onchange="onPackChange(this)"><button class="btn-remove" onclick="removePack(${i})">&times;</button>`;
        list.appendChild(row);
    });
    if (currentPacks.length === 0) {
        list.innerHTML = '<div class="empty">No pack sizes defined</div>';
    }
}

function onPackChange(input) {
    const i = parseInt(input.dataset.index);
    currentPacks[i]._newItems = parseInt(input.value) || 0;
}

function addPackRow() {
    currentPacks.push({ id: null, items: '', _newItems: 0 });
    renderPacks();
    const inputs = document.querySelectorAll('#pack-list input');
    inputs[inputs.length - 1].focus();
}

async function removePack(i) {
    const p = currentPacks[i];
    if (p.id) {
        try {
            const res = await fetch(`${API}/${p.id}`, { method: 'DELETE' });
            const data = await res.json();
            if (!data.result) { showMsg(document.getElementById('pack-msg'), data.error, false); return; }
        } catch { showMsg(document.getElementById('pack-msg'), 'Failed to delete pack', false); return; }
    }
    currentPacks.splice(i, 1);
    renderPacks();
    showMsg(document.getElementById('pack-msg'), 'Pack removed', true);
}

async function submitPacks() {
    const btn = document.getElementById('btn-save');
    const msg = document.getElementById('pack-msg');
    btn.disabled = true;
    try {
        for (let i = 0; i < currentPacks.length; i++) {
            const p = currentPacks[i];
            const newVal = p._newItems || p.items;
            if (!newVal || newVal <= 0) continue;

            if (p.id && p._newItems && p._newItems !== p.items) {
                const res = await fetch(`${API}/${p.id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items: newVal })
                });
                const data = await res.json();
                if (!data.result) { showMsg(msg, data.error, false); btn.disabled = false; return; }
            } else if (!p.id) {
                const res = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items: parseInt(newVal) })
                });
                const data = await res.json();
                if (!data.result) { showMsg(msg, data.error, false); btn.disabled = false; return; }
            }
        }
        showMsg(msg, 'Pack sizes saved', true);
        await loadPacks();
    } catch (e) {
        showMsg(msg, 'Error saving packs', false);
    }
    btn.disabled = false;
}

async function calculate() {
    const order = parseInt(document.getElementById('order-input').value);
    const msg = document.getElementById('calc-msg');
    if (!order || order <= 0) { showMsg(msg, 'Enter a valid number', false); return; }

    try {
        const res = await fetch(`${API}/solve`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ order })
        });
        const data = await res.json();
        if (!data.result) { showMsg(msg, data.error, false); return; }

        const body = document.getElementById('result-body');
        const entries = Object.entries(data.data).sort((a, b) => parseInt(b[0]) - parseInt(a[0]));
        body.innerHTML = entries.map(([pack, qty]) => `<tr><td>${pack}</td><td>${qty}</td></tr>`).join('');
        document.getElementById('result-card').style.display = 'block';
    } catch {
        showMsg(msg, 'Calculation failed', false);
    }
}

async function loadPacks() {
    try {
        const res = await fetch(API);
        const data = await res.json();
        if (data.result && data.data) {
            currentPacks = data.data.map(p => ({ id: p.id, items: p.items }));
        } else {
            currentPacks = [];
        }
    } catch {
        currentPacks = [];
    }
    renderPacks();
}

document.getElementById('order-input').addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
loadPacks();
</script>
</body>
</html>
